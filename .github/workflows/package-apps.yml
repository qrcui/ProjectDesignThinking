name: Package applications

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

defaults:
  run:
    working-directory: visionguard-ai

jobs:
  android:
    name: Android debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: visionguard-ai/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: npm ci
      - run: npm run android:sync
      - run: chmod +x android/gradlew
      - run: ./gradlew assembleDebug
        working-directory: visionguard-ai/android
      - uses: actions/upload-artifact@v4
        with:
          name: VisionGuard-AI-android-debug
          path: visionguard-ai/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  desktop:
    name: Desktop (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            command: npm run desktop:dist:win
            artifact: VisionGuard-AI-windows
          - name: Linux
            os: ubuntu-latest
            command: npm run desktop:dist:linux
            artifact: VisionGuard-AI-linux
          - name: macOS
            os: macos-latest
            command: npm run desktop:dist:mac
            artifact: VisionGuard-AI-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: visionguard-ai/package-lock.json
      - run: npm ci
      - run: npm test
      - run: ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: visionguard-ai/release/VisionGuard-AI-*
          if-no-files-found: error
